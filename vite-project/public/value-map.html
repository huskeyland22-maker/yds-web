<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국내 주식 밸류체인 맵</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .box {
        width: min(920px, 92vw);
        border: 1px solid #334155;
        border-radius: 16px;
        background: #111827;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>🗺️ 국내 주식 밸류체인 맵</h1>
      <p>
        `public/value-map.html` 파일이 연결되었습니다. 기존에 보유한 HTML 원본 내용을 이 파일로
        덮어쓰면 iframe에 그대로 표시됩니다.
      </p>
    </div>
  </body>
</html>
