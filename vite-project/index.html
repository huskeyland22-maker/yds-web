<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0E14" />
    <meta name="description" content="Y'ds 패닉 지수 · 시그널 데스크" />

    <!-- iOS PWA hints (apple-mobile-web-app-* are required for standalone freshness behavior) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Market Pulse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Y'ds 투자 인사이트</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Boot loader: runs the freshness gate BEFORE the app bundle is fetched.
      // If the deployed build is newer than what this HTML belongs to, the gate
      // unregisters service workers, purges Cache Storage and build-scoped
      // localStorage, then hard-reloads with a cache-busting query string.
      import { checkAndEvictStaleBuild, installChunkLoadFailureRecovery } from "/src/utils/pwaFreshness.js"

      async function bootstrap() {
        installChunkLoadFailureRecovery()
        const result = await checkAndEvictStaleBuild()
        if (result.reloaded) return
        await import("/src/main.jsx")
      }

      void bootstrap()
    </script>
  </body>
</html>
