<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0E14" />
    <meta name="description" content="관심에서 쌓고, 분할매수에서 실행한다. 인생 타점은 보너스다. Y'DS 시장 사이클 투자 시스템." />
    <meta property="og:title" content="Y'DS 시장 사이클 투자 시스템" />
    <meta property="og:description" content="관심에서 쌓고, 분할매수에서 실행한다. 인생 타점은 보너스다." />
    <meta property="og:type" content="website" />

    <!-- iOS PWA hints (apple-mobile-web-app-* are required for standalone freshness behavior) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Market Pulse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Y'DS 시장 사이클 투자 시스템</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 모듈 로드 전: 삭제된 /assets/*.js 404 시 화이트 스크린 방지 -->
    <script>
      ;(function () {
        var RECOVERY_KEY = "yds_chunk_recovery"
        var recovering = false

        function recover(reason) {
          if (recovering) return
          try {
            if (localStorage.getItem(RECOVERY_KEY) === "true") {
              console.warn("[Chunk Recovery] skip — recovery flag already set", reason)
              return
            }
          } catch (e) {}
          recovering = true

          var done = function () {
            try {
              sessionStorage.clear()
            } catch (e) {}
            try {
              localStorage.setItem(RECOVERY_KEY, "true")
            } catch (e) {}
            console.log("[Chunk Recovery] Hard reload", reason || "chunk-asset-404")
            window.location.replace("/?recovered=1")
          }

          var swP = Promise.resolve()
          var cacheP = Promise.resolve()
          try {
            if ("serviceWorker" in navigator) {
              swP = navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister() }))
              }).then(function () {
                console.log("[Chunk Recovery] SW removed")
              })
            }
            if ("caches" in window) {
              cacheP = caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k) }))
              }).then(function () {
                console.log("[Chunk Recovery] Cache cleared")
              })
            }
          } catch (e) {
            done()
            return
          }
          Promise.all([swP, cacheP]).then(done).catch(done)
        }

        window.addEventListener(
          "error",
          function (ev) {
            var t = ev && ev.target
            if (!t || t === window) return
            if (t.tagName !== "SCRIPT" && t.tagName !== "LINK") return
            var src = t.src || t.href || ""
            if (src.indexOf("/assets/") !== -1) recover("chunk-asset-404")
          },
          true,
        )

        window.addEventListener("unhandledrejection", function (ev) {
          var msg = String((ev && ev.reason && ev.reason.message) || ev.reason || "")
          if (/dynamically imported module|module script failed|ChunkLoadError|404/i.test(msg)) {
            recover("chunk-import-fail")
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
