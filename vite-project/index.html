<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0E14" />
    <meta name="description" content="Y'ds 패닉 지수 · 시그널 데스크" />

    <!-- iOS PWA hints (apple-mobile-web-app-* are required for standalone freshness behavior) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Market Pulse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Y'ds 투자 인사이트</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 모듈 로드 전: 삭제된 /assets/*.js 404 시 화이트 스크린 방지 -->
    <script>
      ;(function () {
        var OVERLAY_ID = "yds-chunk-recovery-overlay"
        var recovering = false

        function showOverlay() {
          if (document.getElementById(OVERLAY_ID)) return
          var el = document.createElement("div")
          el.id = OVERLAY_ID
          el.setAttribute("role", "alertdialog")
          el.innerHTML =
            '<div style="width:min(100%,20rem);text-align:center;padding:20px 18px;border-radius:12px;border:1px solid rgba(56,189,248,0.28);background:rgba(15,23,42,0.96);font-family:system-ui,sans-serif">' +
            '<p style="margin:0;font-size:15px;font-weight:700;color:#e2e8f0">업데이트 감지됨</p>' +
            '<p style="margin:8px 0 0;font-size:13px;color:#94a3b8">새 버전 적용 중…</p>' +
            '<button type="button" style="margin-top:16px;width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(56,189,248,0.45);background:rgba(14,116,144,0.35);color:#f0f9ff;font-size:14px;font-weight:700;cursor:pointer">새로고침</button>' +
            "</div>"
          el.style.cssText =
            "position:fixed;inset:0;z-index:2147483646;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;background:#0B0E14"
          el.querySelector("button").addEventListener("click", function () {
            recover("user-reload")
          })
          ;(document.body || document.documentElement).appendChild(el)
        }

        function recover(reason) {
          if (recovering) return
          recovering = true
          showOverlay()
          try {
            if ("serviceWorker" in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister() }))
              })
            }
            if ("caches" in window) {
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k) }))
              })
            }
          } catch (e) {}
          setTimeout(function () {
            var u = new URL(window.location.href)
            u.searchParams.set("pwa_v", String(Date.now()))
            u.searchParams.set("reason", reason || "chunk-404")
            window.location.replace(u.pathname + u.search + u.hash)
          }, 400)
        }

        window.addEventListener(
          "error",
          function (ev) {
            var t = ev && ev.target
            if (!t || t === window) return
            if (t.tagName !== "SCRIPT" && t.tagName !== "LINK") return
            var src = t.src || t.href || ""
            if (src.indexOf("/assets/") !== -1) recover("chunk-asset-404")
          },
          true,
        )

        window.addEventListener("unhandledrejection", function (ev) {
          var msg = String((ev && ev.reason && ev.reason.message) || ev.reason || "")
          if (/dynamically imported module|module script failed|ChunkLoadError|404/i.test(msg)) {
            recover("chunk-import-fail")
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
