<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Y'ds 패닉 지수 · 시그널 데스크" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Market Pulse" />
    <title>Y'ds 투자 인사이트</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      async function bootstrapLatestBuild() {
        const BUILD_KEY = "yds-build-version"
        const HARD_RELOAD_KEY = "yds-hard-reload-at"
        const PANIC_MAIN_STORAGE_KEY = "yds-panic-main-v2"
        const HARD_RELOAD_COOLDOWN_MS = 8000
        const now = Date.now()

        const forceHardReload = async (latestVersion) => {
          try {
            const regs = "serviceWorker" in navigator ? await navigator.serviceWorker.getRegistrations() : []
            await Promise.all(regs.map((r) => r.unregister()))
          } catch {
            // noop
          }
          try {
            if ("caches" in window) {
              const keys = await caches.keys()
              await Promise.all(keys.map((k) => caches.delete(k)))
            }
          } catch {
            // noop
          }
          try {
            localStorage.removeItem(PANIC_MAIN_STORAGE_KEY)
          } catch {
            localStorage.removeItem(PANIC_MAIN_STORAGE_KEY)
          }
          localStorage.setItem(BUILD_KEY, latestVersion)
          sessionStorage.setItem(HARD_RELOAD_KEY, String(now))
          const next = new URL(window.location.href)
          next.searchParams.set("hard_reload", String(now))
          window.location.replace(`${next.pathname}${next.search}`)
        }

        let latestVersion = null
        try {
          await fetch(`/manifest.json?t=${Date.now()}`, {
            cache: "no-store",
            headers: {
              Pragma: "no-cache",
              "Cache-Control": "no-cache, no-store, must-revalidate",
            },
          })
          const res = await fetch(`/build-version.json?t=${Date.now()}`, {
            cache: "no-store",
            headers: {
              Pragma: "no-cache",
              "Cache-Control": "no-cache, no-store, must-revalidate",
            },
          })
          if (res.ok) {
            const json = await res.json()
            latestVersion = typeof json?.version === "string" ? json.version : null
          }
        } catch {
          // ignore and continue boot
        }

        const currentVersion = localStorage.getItem(BUILD_KEY)
        const lastHardReloadAt = Number(sessionStorage.getItem(HARD_RELOAD_KEY) || "0")
        const canHardReload = !Number.isFinite(lastHardReloadAt) || now - lastHardReloadAt > HARD_RELOAD_COOLDOWN_MS

        if (latestVersion && currentVersion && currentVersion !== latestVersion && canHardReload) {
          await forceHardReload(latestVersion)
          return
        }

        if (latestVersion) {
          localStorage.setItem(BUILD_KEY, latestVersion)
          console.log("[PWA] LATEST BUILD LOADED:", latestVersion)
        }

        await import("/src/main.jsx")
      }

      void bootstrapLatestBuild()
    </script>
  </body>
</html>
